<div class="container mx-auto px-4 py-12 max-w-4xl">
  <div *ngIf="loading" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
  </div>

  <div *ngIf="error" class="text-center py-20">
    <h2 class="text-2xl font-bold text-red-500 mb-4">{{ error }}</h2>
    <a routerLink="/blogs" class="text-blue-500 hover:underline">&larr; Back to Blogs</a>
  </div>

  <article *ngIf="!loading && !error && blog" class="bg-white rounded-xl shadow-sm overflow-hidden">
    <!-- Cover Image -->
    <div *ngIf="blog.coverImage" class="w-full h-64 md:h-96 relative">
      <img [src]="blog.coverImage" [alt]="blog.title" class="absolute inset-0 w-full h-full object-cover">
    </div>
    
    <div class="p-8 md:p-12">
      <!-- Tags -->
      <div class="flex items-center gap-2 mb-6 flex-wrap">
        <span *ngFor="let tag of blog.tags" class="text-sm font-semibold px-3 py-1 bg-blue-100 text-blue-800 rounded-full">
          {{ tag }}
        </span>
      </div>
      
      <!-- Title -->
      <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-6 leading-tight">
        {{ blog.title }}
      </h1>
      
      <!-- Meta Information -->
      <div class="flex items-center mb-10 pb-6 border-b border-gray-200">
        <div class="flex items-center">
          <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold text-gray-600 mr-4">
            {{ blog.author?.firstName?.charAt(0) || 'A' }}
          </div>
          <div>
            <p class="text-gray-900 font-semibold text-lg leading-none mb-1">
              {{ blog.author?.firstName }} {{ blog.author?.lastName }}
            </p>
            <p class="text-gray-500 text-sm">
              Published on {{ blog.createdAt | date:'mediumDate' }}
            </p>
          </div>
        </div>
      </div>
      
      <!-- Content -->
      <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap">
        {{ blog.content }}
      </div>
      
    </div>
  </article>

  <div class="mt-10" *ngIf="!loading && !error">
    <a routerLink="/blogs" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium transition-colors">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to all articles
    </a>
  </div>
</div>
