<div class="container mx-auto px-4 py-6" style="max-width: 1200px;">
  <div class="text-center mb-6">
    <h1 class="text-4xl font-bold text-900 mb-3">Our Blog</h1>
    <p class="text-lg text-600 max-w-30rem mx-auto line-height-3">Stay updated with the latest articles, tutorials, and news from our community.</p>
  </div>

  <div *ngIf="loading" class="grid formgrid p-fluid">
    <div class="col-12 md:col-6 lg:col-4 mb-4" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="surface-card border-1 border-300 border-round-xl h-full flex flex-column shadow-1 overflow-hidden">
        <p-skeleton width="100%" height="200px" styleClass="border-noround-bottom"></p-skeleton>
        <div class="p-4 flex flex-column flex-grow-1">
          <div class="flex gap-2 mb-3">
             <p-skeleton width="60px" height="1.5rem" styleClass="border-round-2xl"></p-skeleton>
             <p-skeleton width="80px" height="1.5rem" styleClass="border-round-2xl"></p-skeleton>
          </div>
          <p-skeleton width="100%" height="2rem" styleClass="mb-2"></p-skeleton>
          <p-skeleton width="80%" height="2rem" styleClass="mb-4"></p-skeleton>
          <div class="mt-auto pt-3 border-top-1 border-300 flex justify-content-between align-items-center">
             <p-skeleton width="40%" height="1.5rem"></p-skeleton>
             <p-skeleton width="20%" height="1.5rem"></p-skeleton>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="text-center text-red-500 py-6">
    <h2 class="text-xl font-bold">{{ error }}</h2>
  </div>

  <div *ngIf="!loading && !error && blogs.length === 0" class="text-center text-500 py-6">
    <p class="text-lg">No blogs available at the moment.</p>
  </div>

  <div class="grid formgrid p-fluid" *ngIf="!loading && !error">
    <div class="col-12 md:col-6 lg:col-4 mb-4" *ngFor="let blog of blogs">
      <div class="surface-card border-1 border-300 border-round-xl h-full flex flex-column shadow-1 hover:shadow-4 transition-all transition-duration-300 cursor-pointer overflow-hidden" [routerLink]="['/blog', blog.slug || blog._id]">
        <!-- Cover Image -->
        <div class="w-full relative bg-gray-200 flex justify-content-center align-items-center" style="height: 200px;">
          <img *ngIf="blog.coverImage?.url || blog.coverImage" [src]="blog.coverImage?.url || blog.coverImage" [alt]="blog.title" class="absolute top-0 left-0 w-full h-full" style="object-fit: cover;">
          <span *ngIf="!(blog.coverImage?.url || blog.coverImage)" class="text-500"><i class="pi pi-image text-4xl"></i></span>
        </div>
        
        <!-- Content -->
        <div class="p-4 flex flex-column flex-grow-1">
          <div class="flex align-items-center gap-2 mb-3 flex-wrap">
            <span *ngFor="let tag of blog.tags" class="text-xs font-semibold px-2 py-1 bg-blue-100 text-blue-800 border-round-2xl">
              {{ tag }}
            </span>
          </div>
          
          <h2 class="text-xl font-bold text-900 mb-4 mt-0 line-clamp-2" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">
            {{ blog.title }}
          </h2>

          
          <div class="mt-auto flex align-items-center justify-content-between pt-3 border-top-1 border-300">
            <div class="flex align-items-center">
              <span class="text-sm text-600"><i class="pi pi-calendar mr-2"></i>{{ blog.createdAt | date:'mediumDate' }}</span>
            </div>
            <span class="text-primary font-medium text-sm transition-colors duration-200">
              Read More &rarr;
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
