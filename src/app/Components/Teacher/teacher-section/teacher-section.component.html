<p-toast></p-toast>
<div class="flex flex-column h-screen overflow-hidden">
    <!-- Custom Navbar -->
    <nav class="nav-container px-4 py-2 flex justify-content-between align-items-center">
        <div class="nav-logo" routerLink="/">Skill Up.</div>
        <div class="flex align-items-center gap-3">
            <div class="flex flex-column text-right hidden md:flex">
                <span class="font-bold text-900 line-height-2">{{ userDetails?.username }}</span>
                <span class="text-sm text-500 line-height-2">{{ userDetails?.email }}</span>
            </div>
            <div class="profile-section cursor-pointer" (click)="op.toggle($event)">
                <img *ngIf="userDetails?.profileImage; else noImage" [src]="userDetails?.profileImage" class="profile-img">
                <ng-template #noImage>
                    <span class="text-xl font-bold text-green-600">{{ userDetails?.username?.charAt(0) | uppercase }}</span>
                </ng-template>
            </div>
        </div>
    </nav>
    <p-overlayPanel #op>
        <ng-template pTemplate="content">
            <div class="flex flex-column gap-3 p-2 w-12rem">
                <div class="cursor-pointer hover:text-primary flex align-items-center gap-2 font-semibold" routerLink="/user-profile">

                    Logout
                </div>
            </div>
        </ng-template>
