<p-toast></p-toast>
<div class="container">

    <div class="top-container flex mb-4">

        <div class="feedback flex flex-column gap-2 ">
            <div class="heading mb-2 ">Give us feedback</div>
            <div class="flex gap-3">
                <span class="text">Give us a star rating : </span>
                <p-rating [(ngModel)]="reviewData.rating" />
            </div>
            <div class="flex flex-column gap-2">
                <span class="text">Tell us more about this course : </span>
                <textarea rows="2" cols="10" pInputTextarea [(ngModel)]="reviewData.desc"
                    placeholder="Example : This course is ....."></textarea>
            </div>
            <p-button [label]="updateMode ? 'Update Review' : 'Submit Review'" 
            (onClick)="submitReview()"></p-button>
        </div>

        <div *ngIf="reviewsArr?.length>0" class="ratingsect flex flex-column justify-content-center">
            <div class="heading mb-2">
                Course Rating
            </div>
            <div class="rate flex flex-column align-items-center gap-2">
                <div class="rnum">
                    {{ overallRating.toFixed(1) }}
                </div>
                <div class="stars" style="color : #daa520;">
                    <p-rating [(ngModel)]="overallRating" [readonly]="true" [cancel]="false">
                        <ng-template pTemplate="onicon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m8.587 8.236l2.598-5.232a.911.911 0 0 1 1.63 0l2.598 5.232l5.808.844a.902.902 0 0 1 .503 1.542l-4.202 4.07l.992 5.75c.127.738-.653 1.3-1.32.952L12 18.678l-5.195 2.716c-.666.349-1.446-.214-1.319-.953l.992-5.75l-4.202-4.07a.902.902 0 0 1 .503-1.54z"/></svg>
                        </ng-template>
                        <ng-template pTemplate="officon">
                           <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m8.587 8.236l2.598-5.232a.911.911 0 0 1 1.63 0l2.598 5.232l5.808.844a.902.902 0 0 1 .503 1.542l-4.202 4.07l.992 5.75c.127.738-.653 1.3-1.32.952L12 18.678l-5.195 2.716c-.666.349-1.446-.214-1.319-.953l.992-5.75l-4.202-4.07a.902.902 0 0 1 .503-1.54z"/></svg>
                        </ng-template>
                    </p-rating>
                </div>
                <div class="text">
                    out of <b> {{reviewsArr?.length}}</b> reviews.
                </div>
            </div>
        </div>

    </div>


    <div *ngIf="reviewsArr?.length>0" class="reviews">
        <div class="heading my-3 ">
            Student Reviews
        </div>
        <ng-container *ngFor="let item of reviewsArr">
            <div class="rev flex align-items-start gap-3 border-bottom-1 pt-2 pb-3 border-300  ">
                <div class="avtr flex align-items-center justify-content-center">
                    {{item.username.slice(0,1)}}
                </div>
                <div class="namerate flex flex-column gap-1 ">
                    <div class="name text-lg font-bold ">
                        {{item.username}}
                    </div>
                    <div class="rate text-sm flex align-items-center" style="color: #daa520;">
                        <p-rating [(ngModel)]="item.rating" [readonly]="true" [cancel]="false" />
                    </div>
                    <div class="desc">
                        {{item.desc}}
                    </div>
                </div>
            </div>
        </ng-container>
    </div>
    <div *ngIf="reviewsArr?.length==0" class="heading my-3 ">
        Be the first one to review this course
    </div>
</div>
