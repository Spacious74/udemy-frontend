<p-toast></p-toast>
<div class="order-nav p-3 flex justify-content-center align-items-center">
    <div class="inner-nav">
        <div class="logo">Skill Up.</div>
    </div>
</div>
<div class="login-container">

    <div class="left">
        <form #loginForm="ngForm" (ngSubmit)="formSubmission(loginForm)">
            
            <div class="text-2xl font-semibold head text-center mb-5">Login to your account</div>

            <div class="google-btn-wrapper flex justify-content-center">
                <asl-google-signin-button type="standard" size="large" shape="pill" theme="filled_black" text="signin_with" logo_alignment="left"></asl-google-signin-button>
            </div>

            <p-divider align="center" type="solid" >
                or
            </p-divider>

            <div class="form-control p-fluid mb-3 flex flex-column gap-1">
                <label class="font-bold" for="email">Email</label>
                <input required type="email" #email="ngModel" name="email" placeholder="Enter your email..."
                    [class.border-red-300]="email.invalid && email.touched" pInputText ngModel />
                <div *ngIf="loginForm.submitted && !loginForm.value.email" class="text-sm text-red-500">Email is required.</div>
            </div>

            <div class="form-control p-fluid mb-3 flex flex-column gap-1">
                <label class="font-bold" for="password">Password</label>
                <p-password required ngModel name="password" placeholder="Enter your password..." [feedback]="false"
                    [toggleMask]="true"></p-password>
                <div *ngIf="loginForm.submitted && !loginForm.value.password" class="text-red-500">Password is required.
                </div>
                <div class="flex justify-content-between align-items-center py-1">
                    <small class="cursor-pointer hover:text-primary" routerLink="/forgot-password">Forgot Password?</small>
                </div>
            </div>

            <div class="flex flex-column p-fluid gap-3 align-items-center mt-4">
                <button pButton [disabled]="loading" [label]="loading ? 'Loading...': 'Login'"
                    [icon]="loading ? 'pi pi-spin pi-spinner': 'pi pi-sign-in'" type="submit"></button>
                <div class="text-sm">
                    New Here? <a class="text-primary" routerLink="/signup">Create new account</a>
                </div>
            </div>
        </form>
    </div>
    <div class="right">
        <div class="right-txt mb-5">
            <div class="text-xl font-bold mb-2 text-center ">Hey, Welcome again !</div>
            <div class="text-lg">Login to continue you learing journey...</div>
        </div>
        <img src="/assets/images/login.png" alt="login_illustration" />
    </div>
</div>
<app-footer></app-footer>
