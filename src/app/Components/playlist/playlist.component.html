<p-toast></p-toast>
<div class="container">

    <div class="head py-4">
        <div class="header-text text m-auto">
            My Learning
        </div>
    </div>

    @if(loading) {
        <div class="playlist-container m-auto">
            <div class="w-full mt-6 mb-3 pb-2 border-bottom-1 border-300 text-lg font-bold">
                <p-skeleton width="10rem" height="1.5rem"></p-skeleton>
            </div>
            <div class="playlist-cards w-full courses pb-6">
                @for(i of [1,2,3,4]; track $index) {
                <div class="card cursor-pointer">
                    <div class="imgcont mb-1" style="width: 100%;">
                        <p-skeleton width="100%" height="12rem" styleClass="border-round-lg"></p-skeleton>
                    </div>
                    <div class="flex flex-column gap-2 mt-1">
                        <p-skeleton width="80%" height="1.5rem"></p-skeleton>
                        <p-skeleton width="60%" height="1rem"></p-skeleton>
                        <p-skeleton width="100%" height="2.5rem" styleClass="mt-2 border-round-3xl"></p-skeleton>
                    </div>
                </div>
                }
            </div>
        </div>
    } @else {
        <div *ngIf="courseEnrolled?.length == 0">
            <div class="w-full flex justify-content-center">
                <img src="/assets/images/my-learning.png" alt="Start Learning Today">
            </div>
            <div class="text-lg text-center">No courses found</div>
            <div class="text-xl font-bold text-center ">Start Learning Today</div>
        </div>

        <div class="playlist-container m-auto" *ngIf="courseEnrolled?.length>0">

            <div class="w-full mt-6 mb-3 pb-2 border-bottom-1 border-300 text-lg font-bold">
                {{courseEnrolled?.length}} courses
            </div>
            <div class="playlist-cards  w-full courses pb-6">
                <ng-container *ngFor="let item of courseEnrolled">
                    <div (click)="navigateToCoursePlayer(item._id)" class="card cursor-pointer">
                        <div class="imgcont mb-1" style="width: 100%;">
                            <img [src]="item.coursePoster.url" alt="poster" class="w-full border-round-lg"
                                style="object-fit: cover;">
                        </div>
                        <div class="play text-0 flex justify-content-center align-items-center ">
                            <svg xmlns="http://www.w3.org/2000/svg" width="62" height="62" viewBox="0 0 28 28">
                                <path fill="currentColor"
                                    d="M12.766 9.278a1.5 1.5 0 0 0-2.266 1.29v6.864a1.5 1.5 0 0 0 2.266 1.29l6.505-3.862a1 1 0 0 0 0-1.72zM2 14C2 7.373 7.373 2 14 2s12 5.373 12 12s-5.373 12-12 12S2 20.627 2 14M14 3.5C8.201 3.5 3.5 8.201 3.5 14S8.201 24.5 14 24.5S24.5 19.799 24.5 14S19.799 3.5 14 3.5" />
                            </svg>
                        </div>
                        <div class="flex flex-column gap-2 mt-1" routerLink="/player">
                            <div class="title hover:text-green-500 hover:text-underline">
                                {{item.title}}
                            </div>
                            <div class="ins text-sm">
                                Instructor : {{item.educator.edname}}
                            </div>
                            <p-button class="play-btn w-full" icon="pi pi-play" label="Play" size="small" [rounded]="true"
                                (onClick)="navigateToCoursePlayer(item._id)"></p-button>
                        </div>
                    </div>
                </ng-container>
            </div>
        </div>
    }
</div>
