<p-toast position="bottom-right"></p-toast>
<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>

<div class="bg-white border-round-xl shadow-1 border-1 border-gray-100 overflow-hidden">
  <div class="p-4 border-bottom-1 border-gray-100 flex flex-column md:flex-row md:align-items-center justify-content-between gap-4">
    <h2 class="text-xl font-bold text-gray-800 m-0">Manage Courses</h2>
    
    <div class="flex gap-3">
      <span class="p-input-icon-left">
          <i class="pi pi-search"></i>
          <input type="text" pInputText placeholder="Search course title" [(ngModel)]="search" (keyup.enter)="onSearch()">
      </span>
      <button pButton icon="pi pi-search" (click)="onSearch()" class="p-button-outlined"></button>
    </div>
  </div>

  <p-table 
    [value]="courses" 
    [lazy]="true" 
    (onLazyLoad)="loadCourses($event)" 
    [paginator]="true" 
    [rows]="limit" 
    [totalRecords]="totalRecords" 
    [loading]="loading" 
    [rowsPerPageOptions]="[10, 20, 50]"
    responsiveLayout="scroll"
    styleClass="p-datatable-lg">
    
    <ng-template pTemplate="header">
      <tr>
        <th>Course Title</th>
        <th>Instructor</th>
        <th>Category</th>
        <th>Price</th>
        <th class="text-right">Action</th>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="body" let-course>
      <tr>
        <td>
          <div class="font-semibold text-gray-800 m-0">{{ course.title }}</div>
          <div class="text-xs text-gray-500 mt-1">{{ course.level || 'All Levels' }}</div>
        </td>
        <td class="text-gray-600">{{ course.instructor?.username || 'Unknown' }}</td>
        <td>
          <span class="px-2 py-1 surface-100 text-gray-600 border-round text-xs font-medium">{{ course.category?.name || 'Uncategorized' }}</span>
        </td>
        <td class="font-bold text-gray-800">${{ course.price }}</td>
        <td class="text-right">
          <button pButton icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-text" (click)="deleteCourse(course)" pTooltip="Delete Course"></button>
        </td>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center py-8 text-gray-500">
          <i class="pi pi-inbox text-4xl mb-3 text-gray-300"></i>
          <p>No courses found matching your criteria.</p>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
