<div class="bg-white border-round-xl shadow-1 border-1 border-gray-100 overflow-hidden">
  <div class="p-4 border-bottom-1 border-gray-100">
    <div class="flex flex-column md:flex-row md:align-items-center justify-content-between gap-4">
      <h2 class="text-xl font-bold text-gray-800 m-0">Manage Users</h2>
      
      <div class="flex flex-column md:flex-row gap-3">
        <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input type="text" pInputText placeholder="Search name/email" [(ngModel)]="search" (keyup.enter)="onSearch()">
        </span>
        <p-dropdown [options]="roles" [(ngModel)]="role" (onChange)="onRoleChange()" placeholder="Filter by Role" styleClass="w-full md:w-15rem"></p-dropdown>
        <button pButton icon="pi pi-search" (click)="onSearch()" class="p-button-outlined"></button>
      </div>
    </div>
  </div>

  <p-table 
    [value]="users" 
    [lazy]="true" 
    (onLazyLoad)="loadUsers($event)" 
    [paginator]="true" 
    [rows]="limit" 
    [totalRecords]="totalRecords" 
    [loading]="loading" 
    [rowsPerPageOptions]="[10, 20, 50]"
    responsiveLayout="scroll"
    styleClass="p-datatable-lg">
    
    <ng-template pTemplate="header">
      <tr>
        <th>User Details</th>
        <th>Role</th>
        <th>Joined Date</th>
        <th>Status</th>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>
          <div class="flex align-items-center gap-3">
            <div class="w-3rem h-3rem border-circle bg-indigo-100 text-indigo-700 flex align-items-center justify-content-center font-bold text-lg">
              {{ user.username.charAt(0).toUpperCase() }}
            </div>
            <div>
              <p class="font-semibold text-gray-800 m-0">{{ user.username }}</p>
              <p class="text-sm text-gray-500 m-0">{{ user.email }}</p>
            </div>
          </div>
        </td>
        <td>
          <span class="px-3 py-1 border-round-3xl text-xs font-semibold uppercase" style="letter-spacing: 0.05em;" 
                [ngClass]="{'bg-blue-100 text-blue-700': user.role === 'student', 'bg-emerald-100 text-emerald-700': user.role === 'teacher', 'bg-purple-100 text-purple-700': user.role === 'admin'}">
            {{ user.role }}
          </span>
        </td>
        <td class="text-gray-600">{{ user.createdAt | date:'mediumDate' }}</td>
        <td>
          <span class="px-2 py-1 border-round bg-green-50 text-green-600 text-xs font-medium border-1 border-green-200" *ngIf="user.isActive">Active</span>
          <span class="px-2 py-1 border-round bg-red-50 text-red-600 text-xs font-medium border-1 border-red-200" *ngIf="!user.isActive">Inactive</span>
        </td>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center py-8 text-gray-500">
          <i class="pi pi-inbox text-4xl mb-3 text-gray-300"></i>
          <p>No users found matching your criteria.</p>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
