<div class="bg-white max-w-full mx-auto px-2">
  <div class="flex justify-content-between align-items-center mb-4 mt-0">
    <h2 class="text-2xl font-bold m-0 text-gray-800">{{ isEditMode ? 'Update Blog' : 'Create New Blog' }}</h2>
    <p-button *ngIf="isEditMode" icon="pi pi-arrow-left" label="Back to Blogs" routerLink="/admin/blogs" styleClass="p-button-outlined p-button-sm"></p-button>
  </div>

  <div *ngIf="loadingBlog" class="flex justify-content-center py-5">
    <i class="pi pi-spin pi-spinner text-primary" style="font-size: 2rem"></i>
  </div>

  <div *ngIf="successMessage"
    class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
    {{ errorMessage }}
  </div>

  <form *ngIf="!loadingBlog" [formGroup]="blogForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">

    <div class="flex flex-column gap-2">
      <label for="title" class="font-bold text-gray-700">Title *</label>
      <input pInputText id="title" formControlName="title" placeholder="Blog Title" class="w-full" />
      <small class="p-error block" *ngIf="blogForm.get('title')?.touched && blogForm.get('title')?.invalid">
        Title is required.
      </small>
    </div>

    <div class="flex flex-column gap-3">
      <label class="font-bold text-gray-700">Cover Image</label>

      <div class="flex gap-4 align-items-center">
        <div class="flex align-items-center">
          <p-radioButton name="coverImageMode" value="upload" formControlName="coverImageMode"
            inputId="modeUpload"></p-radioButton>
          <label for="modeUpload" class="ml-2">Upload Image</label>
        </div>

        <div class="flex align-items-center">
          <p-radioButton name="coverImageMode" value="url" formControlName="coverImageMode"
            inputId="modeUrl"></p-radioButton>
          <label for="modeUrl" class="ml-2">Paste URL</label>
        </div>
      </div>

      <!-- Mode Upload -->
      <div *ngIf="blogForm.get('coverImageMode')?.value === 'upload'" class="mt-2">
        <p-fileUpload #fileUpload mode="basic" [chooseLabel]="uploadedCoverData ? 'Change Image' : 'Choose'"
          chooseIcon="pi pi-upload" name="demo[]" accept="image/*" maxFileSize="5000000"
          (onSelect)="onImageSelect($event)" (onClear)="clearFileSelection()" [customUpload]="true">
        </p-fileUpload>

        <div class="flex mt-3 gap-2" *ngIf="fileUpload.files.length > 0">
          <p-button [loading]="uploading" label="Upload" icon="pi pi-cloud-upload"
            (click)="uploadFile({files: fileUpload.files})"></p-button>
          <p-button severity="secondary" label="Cancel" icon="pi pi-times" (click)="clearFileSelection()"></p-button>
        </div>

        <div class="mt-3" *ngIf="uploadedCoverData && fileUpload.files.length === 0">
          <p-button [loading]="deleting" label="Delete Uploaded Image" icon="pi pi-trash" severity="danger"
            (click)="deleteFile()"></p-button>
        </div>

        <div *ngIf="imagePreview" class="mt-4">
          <p class="font-semibold mb-2">Preview:</p>
          <img [src]="imagePreview" alt="Image Preview" class="w-full max-w-30rem object-cover border-round shadow-2"
            style="max-height: 300px;" />
        </div>
      </div>

      <!-- Mode URL -->
      <div *ngIf="blogForm.get('coverImageMode')?.value === 'url'" class="mt-2">
        <input pInputText id="coverImageUrl" formControlName="coverImageUrl" placeholder="https://example.com/image.jpg"
          class="w-full max-w-30rem" />
      </div>
    </div>

    <div class="flex flex-column gap-2">
      <label for="tags" class="font-bold text-gray-700">Tags (comma separated)</label>
      <input pInputText id="tags" formControlName="tags" placeholder="e.g. angular, tutorial, coding" class="w-full" />
    </div>

    <div class="flex flex-column gap-2">
      <label for="content" class="font-bold text-gray-700">Content *</label>
      <p-editor formControlName="content" [style]="{'height': '320px'}"></p-editor>
      <small class="p-error block" *ngIf="blogForm.get('content')?.touched && blogForm.get('content')?.invalid">
        Content is required.
      </small>
    </div>

    <div class="flex justify-content-end mt-4">
      <p-button type="submit" [label]="isEditMode ? 'Update Blog' : 'Publish Blog'" icon="pi pi-check" [disabled]="blogForm.invalid || isSubmitting"
        [loading]="isSubmitting"></p-button>
    </div>
  </form>
</div>
