<div class="container mx-auto p-4">
  <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4 max-w-3xl mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Create New Blog</h2>
    
    <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
      {{ errorMessage }}
    </div>

    <form [formGroup]="blogForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">
      
      <div class="flex flex-column gap-2">
        <label for="title" class="font-bold text-gray-700">Title *</label>
        <input pInputText id="title" formControlName="title" placeholder="Blog Title" class="w-full" />
        <small class="p-error block" *ngIf="blogForm.get('title')?.touched && blogForm.get('title')?.invalid">
          Title is required.
        </small>
      </div>

      <div class="flex flex-column gap-2">
        <label for="coverImage" class="font-bold text-gray-700">Cover Image URL</label>
        <input pInputText id="coverImage" formControlName="coverImage" placeholder="https://example.com/image.jpg" class="w-full" />
      </div>

      <div class="flex flex-column gap-2">
        <label for="tags" class="font-bold text-gray-700">Tags (comma separated)</label>
        <input pInputText id="tags" formControlName="tags" placeholder="e.g. angular, tutorial, coding" class="w-full" />
      </div>

      <div class="flex flex-column gap-2">
        <label for="content" class="font-bold text-gray-700">Content *</label>
        <p-editor formControlName="content" [style]="{'height': '320px'}"></p-editor>
        <small class="p-error block" *ngIf="blogForm.get('content')?.touched && blogForm.get('content')?.invalid">
          Content is required.
        </small>
      </div>

      <div class="flex justify-content-end mt-4">
        <p-button type="submit" label="Publish Blog" icon="pi pi-check" [disabled]="blogForm.invalid || isSubmitting" [loading]="isSubmitting"></p-button>
      </div>
    </form>
  </div>
</div>
