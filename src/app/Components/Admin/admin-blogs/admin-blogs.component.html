<p-toast></p-toast>
<div class="card bg-white p-4 border-round shadow-2">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="text-2xl font-bold m-0 text-gray-800">Manage Blogs</h2>
    <p-button label="Create Blog" icon="pi pi-plus" routerLink="/admin/create-blog"></p-button>
  </div>

  <p-table [value]="blogs" [loading]="loading" [paginator]="true" [rows]="10" responsiveLayout="scroll" styleClass="p-datatable-gridlines p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 25%">Title</th>
        <th style="width: 20%">Author</th>
        <th style="width: 15%">Published At</th>
        <th style="width: 10%">Likes</th>
        <th style="width: 15%">Status</th>
        <th style="width: 15%">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-blog>
      <tr>
        <td>{{ blog.title }}</td>
        <td>{{ blog.author?.firstName }} {{ blog.author?.lastName }}</td>
        <td>{{ blog.createdAt | date:'shortDate' }}</td>
        <td class="text-center font-semibold">{{ blog.likes || 0 }}</td>
        <td>
          <p-tag [severity]="blog.isPublished ? 'success' : 'warning'" [value]="blog.isPublished ? 'Published' : 'Hidden'"></p-tag>
        </td>
        <td>
          <div class="flex gap-2">
            <p-button [icon]="blog.isPublished ? 'pi pi-eye-slash' : 'pi pi-eye'" 
                      [label]="blog.isPublished ? 'Hide' : 'Publish'"
                      [severity]="blog.isPublished ? 'warning' : 'success'"
                      (onClick)="toggleVisibility(blog)"
                      styleClass="p-button-sm"></p-button>
            <p-button icon="pi pi-external-link" 
                      [routerLink]="['/blog', blog.slug || blog._id]"
                      styleClass="p-button-sm p-button-info p-button-outlined"
                      target="_blank"
                      pTooltip="View Blog"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4">No blogs found.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
