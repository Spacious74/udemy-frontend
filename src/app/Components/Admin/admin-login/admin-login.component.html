<p-toast position="bottom-right"></p-toast> 
<div class="h-screen w-full flex flex-column align-items-center justify-content-center bg-slate-100 p-4">
  <div class="w-100% w-5 bg-white border-round-lg overflow-hidden">
    <div class="bg-indigo-600 p-6 pb-2 text-center">
      <h2 class="text-3xl font-bold flex align-items-center justify-content-center gap-2">
        <i class="pi pi-shield"></i>
        <span>Skill<span class="text-indigo-200">Admin</span></span>
      </h2>
      <p class="text-indigo-100 mt-1">Sign in to control panel</p>
    </div>
    
    <div class="p-8 pt-0">
      <form #loginForm="ngForm" (ngSubmit)="formSubmission(loginForm)" class="flex flex-column gap-5">
        
        <div class="flex flex-column gap-2">
          <label for="email" class="font-medium text-gray-700">Email Address</label>
          <input pInputText id="email" name="email" type="email" ngModel required 
                 class="w-full p-3 border-round-lg border-gray-300" 
                 placeholder="admin@example.com" />
        </div>
        
        <div class="flex flex-column gap-2">
          <label for="password" class="font-medium text-gray-700">Password</label>
          <p-password id="password" name="password" ngModel required [toggleMask]="true"
                      [feedback]="false" styleClass="w-full" inputStyleClass="w-full p-3 border-round-lg border-gray-300"
                      placeholder="••••••••">
          </p-password>
        </div>
        
        <button pButton type="submit" [loading]="loading" [disabled]="loginForm.invalid"
                class="w-full bg-indigo-600 border-indigo-600 hover:bg-indigo-700 p-3 border-round-lg font-semibold mt-2 transition-colors">
          <span class="w-full text-center">Login to Admin</span>
        </button>
      </form>
      
      <div class="mt-6 text-center">
        <a routerLink="/" class="text-sm text-gray-500 hover:text-indigo-600 transition-colors">
          <i class="pi pi-arrow-left text-xs mr-1"></i> Back to Website
        </a>
      </div>
    </div>
  </div>
</div>
