<div class="flex p-2 h-screen w-full overflow-hidden admin-layout-container">
    <div class="sidebar p-4 sticky flex flex-column justify-content-between" style="width: 20%; height: 100%; overflow-y: auto;">
        <div>
            <div class="nav-logo mb-4 text-white" routerLink="/">Skill Up.</div>
            <ul class="options_list m-0 p-0 list-none flex flex-column gap-2">
                <li *ngFor="let item of menuItems" class="flex gap-3 align-items-center cursor-pointer py-2 p-3 border-round sidebar-tab"
                    [routerLinkActiveOptions]="{ exact: false }" [routerLink]="item.link"
                    routerLinkActive="router-link-active">
                    <i [class]="item.icon + ' text-xl'"></i>
                    <span class="font-medium" style="font-size: 15px;">{{item.label}}</span>
                </li>
            </ul>
        </div>
        <div>
